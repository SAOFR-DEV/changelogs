<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAOFR - Changelogs</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg-primary: #13111c;
    --bg-secondary: #1a1726;
    --bg-card: #1f1b2e;
    --bg-card-hover: #271f3a;
    --bg-code: #231e33;
    --border: #2e2745;
    --border-light: #3d3558;
    --text-primary: #f0ecf8;
    --text-secondary: #b5adc8;
    --text-muted: #7a6f96;
    --accent: #f5a623;
    --accent-secondary: #ffd074;
    --accent-glow: rgba(245, 166, 35, 0.18);
    --buff: #4ade80;
    --buff-bg: rgba(74, 222, 128, 0.1);
    --buff-border: rgba(74, 222, 128, 0.25);
    --nerf: #fb7185;
    --nerf-bg: rgba(251, 113, 133, 0.1);
    --nerf-border: rgba(251, 113, 133, 0.25);
    --fix: #60a5fa;
    --fix-bg: rgba(96, 165, 250, 0.1);
    --fix-border: rgba(96, 165, 250, 0.25);
    --adjust: #c084fc;
    --adjust-bg: rgba(192, 132, 252, 0.1);
    --adjust-border: rgba(192, 132, 252, 0.25);
    --add: #22d3ee;
    --add-bg: rgba(34, 211, 238, 0.1);
    --add-border: rgba(34, 211, 238, 0.25);
    --event: #f9a8d4;
    --event-bg: rgba(249, 168, 212, 0.1);
    --event-border: rgba(249, 168, 212, 0.25);
    --important: #fbbf24;
    --important-bg: rgba(251, 191, 36, 0.1);
    --important-border: rgba(251, 191, 36, 0.25);
    --staff: #a8a2b8;
    --staff-bg: rgba(168, 162, 184, 0.08);
    --staff-border: rgba(168, 162, 184, 0.2);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ========== HEADER ========== */
  .header {
    position: relative;
    padding: 2.5rem 1.5rem 2rem;
    text-align: center;
    overflow: hidden;
    border-bottom: 1px solid var(--border);
    background: linear-gradient(180deg, rgba(192, 132, 252, 0.06) 0%, rgba(245, 166, 35, 0.04) 50%, transparent 100%);
  }
  .header::before {
    content: '';
    position: absolute;
    top: -50px; left: 50%;
    transform: translateX(-50%);
    width: 700px; height: 350px;
    background: radial-gradient(ellipse, rgba(245, 166, 35, 0.12) 0%, rgba(192, 132, 252, 0.05) 40%, transparent 70%);
    pointer-events: none;
  }
  .header-logo {
    margin-bottom: 0.6rem;
  }
  .header-logo img {
    width: 72px;
    height: 72px;
    object-fit: contain;
    filter: drop-shadow(0 0 20px rgba(245, 166, 35, 0.3));
  }
  .header h1 {
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f5a623 0%, #ffd074 50%, #f5a623 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-top: 0.4rem;
    font-weight: 500;
  }

  /* ========== NAV ========== */
  .nav {
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0.7rem 1.5rem;
    display: flex;
    gap: 0.5rem;
    overflow-x: auto;
    position: sticky;
    top: 0;
    z-index: 100;
    -webkit-overflow-scrolling: touch;
  }
  .nav-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 0.45rem 1.1rem;
    border-radius: 20px;
    font-size: 0.83rem;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.2s;
  }
  .nav-btn:hover {
    border-color: var(--accent);
    color: var(--text-primary);
    background: rgba(245, 166, 35, 0.06);
  }
  .nav-btn.active {
    background: linear-gradient(135deg, rgba(245, 166, 35, 0.2), rgba(255, 208, 116, 0.12));
    border-color: var(--accent);
    color: var(--accent-secondary);
    font-weight: 600;
    box-shadow: 0 0 12px rgba(245, 166, 35, 0.15);
  }

  /* ========== MAIN CONTENT ========== */
  .container {
    max-width: 850px;
    margin: 0 auto;
    padding: 2rem 1.5rem;
  }

  .changelog { display: none; }
  .changelog.active { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .changelog-header {
    margin-bottom: 1.75rem;
    padding-bottom: 1.1rem;
    border-bottom: 1px solid var(--border);
  }
  .changelog-date {
    font-size: 1.4rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .changelog-date span { color: var(--accent); }
  .changelog-subtitle {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 0.25rem;
  }

  /* ========== SECTIONS ========== */
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 0.85rem;
    overflow: hidden;
    transition: border-color 0.2s, box-shadow 0.2s;
  }
  .section:hover {
    border-color: var(--border-light);
    box-shadow: 0 2px 16px rgba(0,0,0,0.15);
  }

  .section-header {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.9rem 1.15rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .section-header:hover { background: var(--bg-card-hover); }
  .section-icon { font-size: 1.05rem; }
  .section-title {
    font-weight: 700;
    font-size: 0.92rem;
    flex: 1;
  }
  .section-count {
    font-size: 0.72rem;
    color: var(--text-muted);
    background: var(--bg-code);
    padding: 0.2rem 0.6rem;
    border-radius: 12px;
    font-weight: 500;
  }
  .section-chevron {
    color: var(--text-muted);
    font-size: 0.65rem;
    transition: transform 0.25s ease;
  }
  .section.collapsed .section-chevron { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }

  /* Section type colors */
  .section.important { border-color: var(--important-border); }
  .section.important .section-header { background: var(--important-bg); }
  .section.important .section-title { color: var(--important); }

  .section.event { border-color: var(--event-border); }
  .section.event .section-header { background: var(--event-bg); }
  .section.event .section-title { color: var(--event); }

  .section.add { border-color: var(--add-border); }
  .section.add .section-header { background: var(--add-bg); }
  .section.add .section-title { color: var(--add); }

  .section.buff { border-color: var(--buff-border); }
  .section.buff .section-header { background: var(--buff-bg); }
  .section.buff .section-title { color: var(--buff); }

  .section.nerf { border-color: var(--nerf-border); }
  .section.nerf .section-header { background: var(--nerf-bg); }
  .section.nerf .section-title { color: var(--nerf); }

  .section.fix { border-color: var(--fix-border); }
  .section.fix .section-header { background: var(--fix-bg); }
  .section.fix .section-title { color: var(--fix); }

  .section.adjust { border-color: var(--adjust-border); }
  .section.adjust .section-header { background: var(--adjust-bg); }
  .section.adjust .section-title { color: var(--adjust); }

  .section.staff { border-color: var(--staff-border); }
  .section.staff .section-header { background: var(--staff-bg); }
  .section.staff .section-title { color: var(--staff); }

  /* Section body */
  .section-body {
    padding: 0.25rem 1.15rem 1.1rem;
  }
  .section-body ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .section-body li {
    position: relative;
    padding-left: 1.1rem;
    font-size: 0.88rem;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .section-body li::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--text-muted);
    font-weight: 700;
  }
  .section-body li strong { color: var(--text-primary); font-weight: 600; }
  .section-body li em { color: var(--text-muted); font-style: italic; }

  /* Sub-headers */
  .sub-header {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text-primary);
    margin: 1.1rem 0 0.5rem;
    padding-bottom: 0.35rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .sub-header:first-child { margin-top: 0.4rem; }

  /* Stat blocks */
  .stat-block {
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.65rem 0.9rem;
    margin: 0.4rem 0 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-secondary);
    line-height: 1.8;
  }
  .stat-block .arrow { color: var(--accent); font-weight: 700; }
  .stat-block .val-new { color: var(--text-primary); font-weight: 600; }

  /* Skill name */
  .skill-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-primary);
    margin: 0.85rem 0 0.25rem;
  }

  /* Callout */
  .callout {
    background: var(--accent-glow);
    border: 1px solid rgba(245,166,35,0.25);
    border-radius: var(--radius-sm);
    padding: 0.6rem 0.9rem;
    margin: 0.5rem 0;
    font-size: 0.85rem;
    color: var(--accent-secondary);
  }

  /* Staff notes */
  .staff-note {
    border-left: 3px solid var(--border-light);
    padding: 0.7rem 1rem;
    margin: 0.6rem 0;
    color: var(--text-secondary);
    font-size: 0.85rem;
    line-height: 1.65;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    background: rgba(192, 132, 252, 0.04);
  }
  .staff-note .name {
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 0.35rem;
  }

  /* ========== FOOTER ========== */
  .footer {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--text-muted);
    font-size: 0.75rem;
    border-top: 1px solid var(--border);
  }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 600px) {
    .header { padding: 2rem 1rem 1.5rem; }
    .header h1 { font-size: 1.4rem; }
    .header-logo img { width: 56px; height: 56px; }
    .container { padding: 1.25rem 1rem; }
    .changelog-date { font-size: 1.2rem; }
    .nav { padding: 0.6rem 1rem; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo"><img src="Sao_Mc_icon.png" alt="SAOFR"></div>
  <h1>SAOFR Changelogs</h1>
  <p>Toutes les mises à jour du serveur</p>
</div>

<div class="nav" id="nav"></div>

<div class="container" id="changelogs"></div>

<div class="footer">SAOFR — Changelogs</div>

<script src="changelogs.js"></script>
<script>
  function toggleSection(header) {
    header.parentElement.classList.toggle('collapsed');
  }

  function renderChangelog(data) {
    let html = `
      <div class="changelog-header">
        <div class="changelog-date"><span>#</span> ${data.label}</div>
        <div class="changelog-subtitle">Mise à jour du ${data.date}</div>
      </div>`;

    for (const s of data.sections) {
      html += `
      <section class="section ${s.type}">
        <div class="section-header" onclick="toggleSection(this)">
          <span class="section-icon">${s.icon}</span>
          <span class="section-title">${s.title}</span>
          <span class="section-count">${s.count}</span>
          <span class="section-chevron">▼</span>
        </div>
        <div class="section-body">${s.content}</div>
      </section>`;
    }
    return html;
  }

  function init() {
    const container = document.getElementById('changelogs');
    const nav = document.getElementById('nav');

    CHANGELOGS.forEach((cl, i) => {
      const div = document.createElement('div');
      div.className = 'changelog' + (i === 0 ? ' active' : '');
      div.dataset.index = i;
      div.innerHTML = renderChangelog(cl);
      container.appendChild(div);

      const btn = document.createElement('button');
      btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
      btn.textContent = cl.label;
      btn.onclick = () => switchTo(i);
      nav.appendChild(btn);
    });
  }

  function switchTo(index) {
    document.querySelectorAll('.changelog').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));
    document.querySelector(`.changelog[data-index="${index}"]`).classList.add('active');
    document.querySelectorAll('#nav .nav-btn')[index].classList.add('active');
    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  init();
</script>

</body>
</html>
