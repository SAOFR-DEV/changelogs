<!DOCTYPE html>
<html lang="fr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>SAOFR - Changelogs</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500&display=swap');

  :root {
    --bg-primary: #0a0c10;
    --bg-secondary: #11131a;
    --bg-card: #161922;
    --bg-card-hover: #1a1e29;
    --bg-code: #1c2030;
    --border: #222736;
    --border-light: #2a3045;
    --text-primary: #e8eaf0;
    --text-secondary: #8b92a8;
    --text-muted: #555d75;
    --accent: #f59e0b;
    --accent-dim: #b47508;
    --accent-glow: rgba(245, 158, 11, 0.12);
    --buff: #22c55e;
    --buff-bg: rgba(34, 197, 94, 0.06);
    --buff-border: rgba(34, 197, 94, 0.18);
    --nerf: #ef4444;
    --nerf-bg: rgba(239, 68, 68, 0.06);
    --nerf-border: rgba(239, 68, 68, 0.18);
    --fix: #3b82f6;
    --fix-bg: rgba(59, 130, 246, 0.06);
    --fix-border: rgba(59, 130, 246, 0.18);
    --adjust: #a855f7;
    --adjust-bg: rgba(168, 85, 247, 0.06);
    --adjust-border: rgba(168, 85, 247, 0.18);
    --add: #06b6d4;
    --add-bg: rgba(6, 182, 212, 0.06);
    --add-border: rgba(6, 182, 212, 0.18);
    --event: #f472b6;
    --event-bg: rgba(244, 114, 182, 0.06);
    --event-border: rgba(244, 114, 182, 0.18);
    --important: #f59e0b;
    --important-bg: rgba(245, 158, 11, 0.06);
    --important-border: rgba(245, 158, 11, 0.18);
    --staff: #64748b;
    --staff-bg: rgba(100, 116, 139, 0.06);
    --staff-border: rgba(100, 116, 139, 0.18);
    --radius: 14px;
    --radius-sm: 8px;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg-primary);
    color: var(--text-primary);
    font-family: 'Inter', sans-serif;
    line-height: 1.6;
    min-height: 100vh;
  }

  /* ========== HEADER ========== */
  .header {
    position: relative;
    padding: 3rem 1.5rem 2.5rem;
    text-align: center;
    overflow: hidden;
  }
  .header::before {
    content: '';
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%);
    width: 600px; height: 300px;
    background: radial-gradient(ellipse, rgba(245,158,11,0.1) 0%, transparent 70%);
    pointer-events: none;
  }
  .header-logo {
    font-size: 2.5rem;
    margin-bottom: 0.5rem;
  }
  .header h1 {
    font-size: 1.8rem;
    font-weight: 800;
    letter-spacing: -0.03em;
    background: linear-gradient(135deg, #f59e0b 0%, #fbbf24 50%, #f59e0b 100%);
    -webkit-background-clip: text;
    -webkit-text-fill-color: transparent;
    background-clip: text;
  }
  .header p {
    color: var(--text-muted);
    font-size: 0.9rem;
    margin-top: 0.5rem;
    font-weight: 500;
  }

  /* ========== SIDEBAR NAV (desktop) / TOP NAV (mobile) ========== */
  .layout {
    display: flex;
    max-width: 1100px;
    margin: 0 auto;
    gap: 0;
  }

  .sidebar {
    position: sticky;
    top: 0;
    height: 100vh;
    width: 240px;
    min-width: 240px;
    padding: 1.5rem 1rem;
    border-right: 1px solid var(--border);
    overflow-y: auto;
    background: var(--bg-secondary);
  }
  .sidebar-title {
    font-size: 0.7rem;
    font-weight: 700;
    text-transform: uppercase;
    letter-spacing: 0.08em;
    color: var(--text-muted);
    margin-bottom: 0.75rem;
    padding-left: 0.5rem;
  }
  .sidebar .nav-btn {
    display: flex;
    align-items: center;
    gap: 0.6rem;
    width: 100%;
    background: transparent;
    border: none;
    color: var(--text-secondary);
    padding: 0.6rem 0.75rem;
    border-radius: var(--radius-sm);
    font-size: 0.85rem;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    transition: all 0.15s;
    text-align: left;
  }
  .sidebar .nav-btn:hover {
    background: rgba(255,255,255,0.04);
    color: var(--text-primary);
  }
  .sidebar .nav-btn.active {
    background: var(--accent-glow);
    color: var(--accent);
    font-weight: 600;
  }
  .sidebar .nav-btn .nav-dot {
    width: 6px; height: 6px;
    border-radius: 50%;
    background: var(--text-muted);
    flex-shrink: 0;
    transition: all 0.15s;
  }
  .sidebar .nav-btn.active .nav-dot {
    background: var(--accent);
    box-shadow: 0 0 6px var(--accent);
  }

  /* Mobile nav */
  .mobile-nav {
    display: none;
    background: var(--bg-secondary);
    border-bottom: 1px solid var(--border);
    padding: 0.6rem 1rem;
    overflow-x: auto;
    position: sticky;
    top: 0;
    z-index: 100;
    gap: 0.4rem;
    -webkit-overflow-scrolling: touch;
  }
  .mobile-nav .nav-btn {
    background: transparent;
    border: 1px solid var(--border);
    color: var(--text-secondary);
    padding: 0.4rem 0.9rem;
    border-radius: 20px;
    font-size: 0.8rem;
    font-family: 'Inter', sans-serif;
    font-weight: 500;
    cursor: pointer;
    white-space: nowrap;
    transition: all 0.15s;
  }
  .mobile-nav .nav-btn:hover { border-color: var(--accent); color: var(--text-primary); }
  .mobile-nav .nav-btn.active {
    background: var(--accent);
    border-color: var(--accent);
    color: #000;
    font-weight: 600;
  }

  /* ========== MAIN CONTENT ========== */
  .main {
    flex: 1;
    min-width: 0;
    padding: 2rem 2.5rem;
  }

  .changelog { display: none; }
  .changelog.active { display: block; animation: fadeIn 0.3s ease; }

  @keyframes fadeIn {
    from { opacity: 0; transform: translateY(8px); }
    to { opacity: 1; transform: translateY(0); }
  }

  .changelog-header {
    margin-bottom: 2rem;
    padding-bottom: 1.25rem;
    border-bottom: 1px solid var(--border);
  }
  .changelog-date {
    font-size: 1.5rem;
    font-weight: 800;
    letter-spacing: -0.02em;
  }
  .changelog-date span { color: var(--accent); }
  .changelog-subtitle {
    color: var(--text-muted);
    font-size: 0.85rem;
    margin-top: 0.3rem;
  }

  /* ========== SECTIONS ========== */
  .section {
    background: var(--bg-card);
    border: 1px solid var(--border);
    border-radius: var(--radius);
    margin-bottom: 0.85rem;
    overflow: hidden;
    transition: border-color 0.2s;
  }
  .section:hover { border-color: var(--border-light); }

  .section-header {
    display: flex;
    align-items: center;
    gap: 0.65rem;
    padding: 0.9rem 1.15rem;
    cursor: pointer;
    user-select: none;
    transition: background 0.15s;
  }
  .section-header:hover { background: var(--bg-card-hover); }
  .section-icon { font-size: 1.05rem; }
  .section-title {
    font-weight: 700;
    font-size: 0.92rem;
    flex: 1;
  }
  .section-count {
    font-size: 0.72rem;
    color: var(--text-muted);
    background: var(--bg-code);
    padding: 0.2rem 0.6rem;
    border-radius: 12px;
    font-weight: 500;
  }
  .section-chevron {
    color: var(--text-muted);
    font-size: 0.65rem;
    transition: transform 0.25s ease;
  }
  .section.collapsed .section-chevron { transform: rotate(-90deg); }
  .section.collapsed .section-body { display: none; }

  /* Section type colors */
  .section.important { border-color: var(--important-border); }
  .section.important .section-header { background: var(--important-bg); }
  .section.important .section-title { color: var(--important); }

  .section.event { border-color: var(--event-border); }
  .section.event .section-header { background: var(--event-bg); }
  .section.event .section-title { color: var(--event); }

  .section.add { border-color: var(--add-border); }
  .section.add .section-header { background: var(--add-bg); }
  .section.add .section-title { color: var(--add); }

  .section.buff { border-color: var(--buff-border); }
  .section.buff .section-header { background: var(--buff-bg); }
  .section.buff .section-title { color: var(--buff); }

  .section.nerf { border-color: var(--nerf-border); }
  .section.nerf .section-header { background: var(--nerf-bg); }
  .section.nerf .section-title { color: var(--nerf); }

  .section.fix { border-color: var(--fix-border); }
  .section.fix .section-header { background: var(--fix-bg); }
  .section.fix .section-title { color: var(--fix); }

  .section.adjust { border-color: var(--adjust-border); }
  .section.adjust .section-header { background: var(--adjust-bg); }
  .section.adjust .section-title { color: var(--adjust); }

  .section.staff { border-color: var(--staff-border); }
  .section.staff .section-header { background: var(--staff-bg); }
  .section.staff .section-title { color: var(--staff); }

  /* Section body */
  .section-body {
    padding: 0.25rem 1.15rem 1.1rem;
  }
  .section-body ul {
    list-style: none;
    display: flex;
    flex-direction: column;
    gap: 0.4rem;
  }
  .section-body li {
    position: relative;
    padding-left: 1.1rem;
    font-size: 0.88rem;
    color: var(--text-secondary);
    line-height: 1.6;
  }
  .section-body li::before {
    content: '›';
    position: absolute;
    left: 0;
    color: var(--text-muted);
    font-weight: 700;
  }
  .section-body li strong { color: var(--text-primary); font-weight: 600; }
  .section-body li em { color: var(--text-muted); font-style: italic; }

  /* Sub-headers */
  .sub-header {
    font-size: 0.82rem;
    font-weight: 700;
    color: var(--text-primary);
    margin: 1.1rem 0 0.5rem;
    padding-bottom: 0.35rem;
    border-bottom: 1px solid var(--border);
    display: flex;
    align-items: center;
    gap: 0.4rem;
  }
  .sub-header:first-child { margin-top: 0.4rem; }

  /* Stat blocks */
  .stat-block {
    background: var(--bg-code);
    border: 1px solid var(--border);
    border-radius: var(--radius-sm);
    padding: 0.65rem 0.9rem;
    margin: 0.4rem 0 0.6rem;
    font-family: 'JetBrains Mono', monospace;
    font-size: 0.78rem;
    color: var(--text-secondary);
    line-height: 1.8;
  }
  .stat-block .arrow { color: var(--accent); font-weight: 700; }
  .stat-block .val-new { color: var(--text-primary); font-weight: 600; }

  /* Skill name */
  .skill-name {
    font-size: 0.85rem;
    font-weight: 600;
    color: var(--text-primary);
    margin: 0.85rem 0 0.25rem;
  }

  /* Callout */
  .callout {
    background: var(--accent-glow);
    border: 1px solid rgba(245,158,11,0.2);
    border-radius: var(--radius-sm);
    padding: 0.6rem 0.9rem;
    margin: 0.5rem 0;
    font-size: 0.85rem;
    color: var(--accent);
  }

  /* Staff notes */
  .staff-note {
    border-left: 3px solid var(--border);
    padding: 0.7rem 1rem;
    margin: 0.6rem 0;
    color: var(--text-secondary);
    font-size: 0.85rem;
    line-height: 1.65;
    border-radius: 0 var(--radius-sm) var(--radius-sm) 0;
    background: rgba(255,255,255,0.01);
  }
  .staff-note .name {
    font-weight: 700;
    color: var(--text-primary);
    margin-bottom: 0.35rem;
  }

  /* ========== FOOTER ========== */
  .footer {
    text-align: center;
    padding: 2rem 1rem;
    color: var(--text-muted);
    font-size: 0.75rem;
    border-top: 1px solid var(--border);
  }

  /* ========== RESPONSIVE ========== */
  @media (max-width: 768px) {
    .sidebar { display: none; }
    .mobile-nav { display: flex; }
    .main { padding: 1.25rem 1rem; }
    .header { padding: 2rem 1rem 1.5rem; }
    .header h1 { font-size: 1.4rem; }
    .header-logo { font-size: 2rem; }
    .changelog-date { font-size: 1.2rem; }
  }

  /* Scrollbar */
  ::-webkit-scrollbar { width: 5px; height: 5px; }
  ::-webkit-scrollbar-track { background: transparent; }
  ::-webkit-scrollbar-thumb { background: var(--border); border-radius: 3px; }
  ::-webkit-scrollbar-thumb:hover { background: var(--text-muted); }
</style>
</head>
<body>

<div class="header">
  <div class="header-logo">⚔️</div>
  <h1>SAOFR Changelogs</h1>
  <p>Toutes les mises à jour du serveur</p>
</div>

<div class="mobile-nav" id="mobile-nav"></div>

<div class="layout">
  <nav class="sidebar" id="sidebar">
    <div class="sidebar-title">Mises à jour</div>
  </nav>

  <main class="main" id="changelogs"></main>
</div>

<div class="footer">SAOFR — Changelogs</div>

<script src="changelogs.js"></script>
<script>
  function toggleSection(header) {
    header.parentElement.classList.toggle('collapsed');
  }

  function renderChangelog(data) {
    let html = `
      <div class="changelog-header">
        <div class="changelog-date"><span>#</span> ${data.label}</div>
        <div class="changelog-subtitle">Mise à jour du ${data.date}</div>
      </div>`;

    for (const s of data.sections) {
      html += `
      <section class="section ${s.type}">
        <div class="section-header" onclick="toggleSection(this)">
          <span class="section-icon">${s.icon}</span>
          <span class="section-title">${s.title}</span>
          <span class="section-count">${s.count}</span>
          <span class="section-chevron">▼</span>
        </div>
        <div class="section-body">${s.content}</div>
      </section>`;
    }
    return html;
  }

  function init() {
    const container = document.getElementById('changelogs');
    const sidebar = document.getElementById('sidebar');
    const mobileNav = document.getElementById('mobile-nav');

    CHANGELOGS.forEach((cl, i) => {
      // Create changelog div
      const div = document.createElement('div');
      div.className = 'changelog' + (i === 0 ? ' active' : '');
      div.dataset.index = i;
      div.innerHTML = renderChangelog(cl);
      container.appendChild(div);

      // Sidebar button
      const btn = document.createElement('button');
      btn.className = 'nav-btn' + (i === 0 ? ' active' : '');
      btn.innerHTML = `<span class="nav-dot"></span> ${cl.label}`;
      btn.onclick = () => switchTo(i);
      sidebar.appendChild(btn);

      // Mobile button
      const mbtn = document.createElement('button');
      mbtn.className = 'nav-btn' + (i === 0 ? ' active' : '');
      mbtn.textContent = cl.label;
      mbtn.onclick = () => switchTo(i);
      mobileNav.appendChild(mbtn);
    });
  }

  function switchTo(index) {
    document.querySelectorAll('.changelog').forEach(c => c.classList.remove('active'));
    document.querySelectorAll('.nav-btn').forEach(b => b.classList.remove('active'));

    document.querySelector(`.changelog[data-index="${index}"]`).classList.add('active');

    // Activate both sidebar and mobile nav buttons
    const sidebarBtns = document.querySelectorAll('#sidebar .nav-btn');
    const mobileBtns = document.querySelectorAll('#mobile-nav .nav-btn');
    if (sidebarBtns[index]) sidebarBtns[index].classList.add('active');
    if (mobileBtns[index]) mobileBtns[index].classList.add('active');

    window.scrollTo({ top: 0, behavior: 'smooth' });
  }

  init();
</script>

</body>
</html>
